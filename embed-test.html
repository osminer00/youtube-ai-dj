<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Embed Test</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111;
    color:#f5f5f5;
    font-family:Arial,sans-serif;
    padding:24px;
  }
  .wrap{
    width:min(960px,100%);
  }
  .controls{
    display:flex;
    gap:12px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  input{
    flex:1 1 320px;
    padding:12px 14px;
    border:1px solid #444;
    background:#1a1a1a;
    color:#fff;
    border-radius:8px;
    font-size:16px;
  }
  button{
    padding:12px 16px;
    border:0;
    border-radius:8px;
    background:#ff3333;
    color:#fff;
    font-size:16px;
    cursor:pointer;
  }
  .frame{
    aspect-ratio:16/9;
    width:100%;
    background:#000;
    border-radius:12px;
    overflow:hidden;
  }
  iframe{
    width:100%;
    height:100%;
    border:0;
  }
  .note{
    margin-top:12px;
    color:#bbb;
    line-height:1.5;
    font-size:14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <input id="video-input" type="text" value="https://www.youtube.com/watch?v=hTWKbfoikeg" placeholder="Paste YouTube URL or 11-character video ID">
      <button id="load-btn" type="button">Load Embed</button>
    </div>
    <div class="frame">
      <iframe id="player" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
    <div class="note">
      This page is intentionally minimal. If a video still shows "Video unavailable" here, the restriction is coming from YouTube rather than the AI DJ app.
    </div>
  </div>
<script>
function getVideoId(input){
  const value=String(input||'').trim();
  if(!value) return '';
  const match=value.match(/(?:v=|youtu\.be\/|embed\/|shorts\/|live\/)([A-Za-z0-9_-]{11})/);
  if(match) return match[1];
  if(/^[A-Za-z0-9_-]{11}$/.test(value)) return value;
  return '';
}

function loadEmbed(){
  const raw=document.getElementById('video-input').value;
  const videoId=getVideoId(raw);
  if(!videoId){
    alert('Paste a valid YouTube URL or 11-character video ID.');
    return;
  }
  const params=new URLSearchParams({
    autoplay:'1',
    playsinline:'1',
    rel:'0',
    modestbranding:'1',
    origin:window.location.origin
  });
  document.getElementById('player').src=`https://www.youtube.com/embed/${videoId}?${params.toString()}`;
}

document.getElementById('load-btn').addEventListener('click',loadEmbed);
document.getElementById('video-input').addEventListener('keydown',event=>{
  if(event.key==='Enter') loadEmbed();
});

loadEmbed();
</script>
</body>
</html>
