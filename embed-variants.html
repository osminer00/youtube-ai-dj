<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Embed Variants</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    background:#0d0d0d;
    color:#f4f4f4;
    font-family:Arial,sans-serif;
    padding:24px;
  }
  .wrap{
    width:min(1400px,100%);
    margin:0 auto;
  }
  .controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  input{
    flex:1 1 420px;
    background:#171717;
    color:#fff;
    border:1px solid #3a3a3a;
    border-radius:10px;
    padding:12px 14px;
    font-size:15px;
  }
  button{
    background:#ff3b30;
    color:#fff;
    border:0;
    border-radius:10px;
    padding:12px 16px;
    font-size:15px;
    cursor:pointer;
  }
  .note{
    color:#b9b9b9;
    font-size:14px;
    line-height:1.5;
    margin-bottom:20px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:18px;
  }
  .card{
    background:#141414;
    border:1px solid #2a2a2a;
    border-radius:14px;
    overflow:hidden;
  }
  .card h2{
    margin:0;
    padding:12px 14px 8px;
    font-size:15px;
  }
  .meta{
    padding:0 14px 12px;
    color:#8e8e8e;
    font-size:12px;
    line-height:1.5;
    min-height:48px;
  }
  .frame{
    aspect-ratio:16/9;
    background:#000;
  }
  iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#000;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <input id="video-input" type="text" value="https://www.youtube.com/watch?v=hTWKbfoikeg" placeholder="Paste a YouTube URL or 11-character video ID">
      <button id="load-btn" type="button">Load Variants</button>
    </div>
    <div class="note">
      This page does not copy Songbattle's code. It compares several common YouTube embed styles in a blank environment so we can see if one variant behaves differently for the same video.
    </div>
    <div class="grid" id="grid"></div>
  </div>
<script>
const variants=[
  {
    title:'Standard Embed',
    description:'youtube.com/embed with autoplay, no origin parameter',
    build:videoId=>`https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0`
  },
  {
    title:'Standard + Origin',
    description:'youtube.com/embed with origin and modestbranding',
    build:videoId=>`https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0&modestbranding=1&origin=${encodeURIComponent(window.location.origin)}`
  },
  {
    title:'No Cookie Embed',
    description:'youtube-nocookie embed variant',
    build:videoId=>`https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0`
  },
  {
    title:'Plain Embed',
    description:'Bare minimum youtube.com/embed URL',
    build:videoId=>`https://www.youtube.com/embed/${videoId}`
  }
];

function getVideoId(input){
  const value=String(input||'').trim();
  if(!value) return '';
  const match=value.match(/(?:v=|youtu\.be\/|embed\/|shorts\/|live\/)([A-Za-z0-9_-]{11})/);
  if(match) return match[1];
  if(/^[A-Za-z0-9_-]{11}$/.test(value)) return value;
  return '';
}

function buildCardHtml(variant,url){
  return `<section class="card">
    <h2>${variant.title}</h2>
    <div class="meta">${variant.description}</div>
    <div class="frame">
      <iframe
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
        src="${url}"></iframe>
    </div>
  </section>`;
}

function loadVariants(){
  const raw=document.getElementById('video-input').value;
  const videoId=getVideoId(raw);
  if(!videoId){
    alert('Paste a valid YouTube URL or 11-character video ID.');
    return;
  }
  const html=variants.map(variant=>buildCardHtml(variant,variant.build(videoId))).join('');
  document.getElementById('grid').innerHTML=html;
}

document.getElementById('load-btn').addEventListener('click',loadVariants);
document.getElementById('video-input').addEventListener('keydown',event=>{
  if(event.key==='Enter') loadVariants();
});

loadVariants();
</script>
</body>
</html>
